name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Apply Spotless formatting (google-java-format, JDK 21 required)
        run: ./mvnw spotless:apply -q

      - name: Run full verification (unit tests + ArchUnit + JaCoCo)
        run: ./mvnw verify -T 1C

      - name: Run integration tests (Testcontainers — requires Docker)
        run: ./mvnw verify -DskipITs=false -T 1C

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: "**/target/site/jacoco/**"
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Tests
          path: "**/target/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: false
