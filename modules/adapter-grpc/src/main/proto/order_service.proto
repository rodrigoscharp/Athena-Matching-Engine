syntax = "proto3";

package athena.trading.v1;

option java_package = "com.athena.adapter.grpc.proto";
option java_outer_classname = "OrderServiceProto";
option java_multiple_files = true;

/**
 * Order lifecycle service for the Athena Matching Engine.
 * Preferred over REST for low-latency, high-throughput clients.
 *
 * All prices in integer ticks, quantities in lots (ADR-006).
 * All mutating RPCs require the Idempotency-Key metadata header.
 */
service OrderService {

  /** Submit a new order. Idempotent on Idempotency-Key. */
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);

  /** Cancel a resting order. Idempotent on Idempotency-Key. */
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);

  /**
   * Server-streaming: subscribe to real-time order book updates for a symbol.
   * The server pushes a snapshot every ~250ms while the stream is open.
   */
  rpc StreamBookUpdates(BookStreamRequest) returns (stream BookSnapshot);
}

// ── Place order ────────────────────────────────────────────────────────────────

message PlaceOrderRequest {
  string idempotency_key   = 1;
  string symbol            = 2;
  Side   side              = 3;
  Type   type              = 4;
  int64  limit_price_ticks = 5; // 0 for MARKET orders
  int64  quantity_lots     = 6;
}

message PlaceOrderResponse {
  string order_id = 1;
}

// ── Cancel order ───────────────────────────────────────────────────────────────

message CancelOrderRequest {
  string idempotency_key = 1;
  string order_id        = 2;
}

message CancelOrderResponse {
  string order_id  = 1;
  bool   cancelled = 2;
}

// ── Book streaming ─────────────────────────────────────────────────────────────

message BookStreamRequest {
  string symbol = 1;
}

message BookSnapshot {
  string              symbol               = 1;
  repeated PriceLevel bids                 = 2;
  repeated PriceLevel asks                 = 3;
  int64               taken_at_epoch_millis = 4;
}

message PriceLevel {
  int64 price_ticks          = 1;
  int64 total_quantity_lots  = 2;
  int32 order_count          = 3;
}

// ── Enums ──────────────────────────────────────────────────────────────────────

enum Side {
  SIDE_UNSPECIFIED = 0;
  BUY              = 1;
  SELL             = 2;
}

enum Type {
  TYPE_UNSPECIFIED = 0;
  LIMIT            = 1;
  MARKET           = 2;
}
